<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72" fill="none">
  <!-- NOC_Beam wordmark, "The Trace" variant.
       Marketing / about-dialog use. Decorative tail = cyan beam + amber endpoint.
       Use currentColor for the dark text so Qt can theme it. -->
  <g font-family="'Cascadia Code', 'Cascadia Mono', ui-monospace, monospace" font-weight="600">
    <text x="8" y="50" font-size="40" fill="currentColor" letter-spacing="-1">NOC</text>
    <text x="100" y="50" font-size="40" fill="#7FD3FF">_</text>
  </g>
  <g font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600">
    <text x="124" y="50" font-size="40" fill="currentColor" letter-spacing="-0.5">Beam</text>
  </g>
  <line x1="244" y1="32" x2="352" y2="32" stroke="#7FD3FF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="352" cy="32" r="4" fill="#FFB86C"/>
</svg>
