<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" width="280" height="72" fill="none">
  <!-- NOC_Beam wordmark, "Hostname" variant.
       Mono-only, fits a 44 px title bar at 18 px tall.
       Use currentColor for the dark text so Qt can theme it. -->
  <g font-family="'Cascadia Code', 'Cascadia Mono', ui-monospace, monospace" font-weight="500">
    <text x="8" y="48" font-size="36" fill="currentColor" letter-spacing="-0.5">noc</text>
    <text x="76" y="48" font-size="36" fill="#7FD3FF">_</text>
    <text x="98" y="48" font-size="36" fill="currentColor" letter-spacing="-0.5">beam</text>
  </g>
  <rect x="8" y="58" width="186" height="2" fill="#7FD3FF" opacity="0.35"/>
</svg>
